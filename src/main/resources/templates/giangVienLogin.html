<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giảng viên đăng nhập</title>
    <link rel="stylesheet" th:href="@{/css/giangVienLogin.css}">
</head>
<body>

<div class="login-container">
    <h2>Đăng nhập</h2>

    <form th:action="@{/giangVien/giangVienLogin}" th:object="${giangVienLogin}" method="post">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}" placeholder="example@school.edu" required />
        </div>

        <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input type="password" id="password" th:field="*{password}" placeholder="••••••••" required />
        </div>

        <button type="submit">Đăng nhập</button>

        <div th:if="${error}" class="error-msg" th:text="${error}"></div>
    </form>
</div>

</body>
</html>
