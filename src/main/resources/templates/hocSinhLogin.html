<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Học sinh đâng nhập</title>
</head>
<body>
<form th:action="@{/hocSinh/hocSinhLogin}" th:object="${hocSinhLogin}" method="post">

    <div>
        <label>Email:</label>
        <input type="email" th:field="*{email}" required />
    </div>

    <div>
        <label>Password:</label>
        <input type="password" th:field="*{password}" required />
    </div>

    <button type="submit">Login</button>

    <p th:if="${error}" th:text="${error}" style="color:#ff0000;"></p>
</form>
</body>
</html>
